<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Browser</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;
  --surface:#1a1a2e;
  --surface2:#252540;
  --primary:#6c63ff;
  --primary-dim:#4a42d4;
  --accent:#ff6584;
  --text:#e8e8f0;
  --text-dim:#9090b0;
  --radius:12px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
input,button{font:inherit;color:inherit}
.hidden{display:none!important}

/* Header */
header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.5)}
.header-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;max-width:900px;margin:0 auto}
.logo{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.search-wrap{flex:1;min-width:180px;display:flex;gap:8px}
.search-wrap input{flex:1;padding:10px 16px;border-radius:var(--radius);border:2px solid var(--surface2);background:var(--surface);color:var(--text);outline:none;transition:border .2s;font-size:15px}
.search-wrap input:focus{border-color:var(--primary)}
.search-wrap button{padding:10px 18px;border:none;border-radius:var(--radius);background:var(--primary);color:#fff;cursor:pointer;font-weight:600;transition:background .2s,transform .1s;font-size:15px}
.search-wrap button:hover{background:var(--primary-dim)}
.search-wrap button:active{transform:scale(.96)}

/* Tabs */
.tabs{display:flex;gap:4px;max-width:900px;margin:16px auto 0;padding:0 20px}
.tab{padding:10px 24px;border:none;border-radius:var(--radius) var(--radius) 0 0;background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--surface2);color:var(--primary)}
.tab .badge{display:inline-block;background:var(--accent);color:#fff;font-size:11px;border-radius:10px;padding:1px 7px;margin-left:6px;vertical-align:top}

/* Content */
main{max-width:900px;margin:0 auto;padding:16px 20px}
.section-title{font-size:14px;color:var(--text-dim);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}

/* Station Card */
.station{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:background .2s,transform .1s;border:2px solid transparent}
.station:hover{background:var(--surface2)}
.station.playing{border-color:var(--primary);background:var(--surface2)}
.station-info{flex:1;min-width:0}
.station-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.station-meta{font-size:12px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.station-meta span{margin-right:10px}
.station-btns{display:flex;gap:6px;flex-shrink:0}
.btn-icon{width:38px;height:38px;border:none;border-radius:50%;background:var(--surface2);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;flex-shrink:0}
.btn-icon:hover{background:var(--primary);color:#fff}
.btn-icon.active{background:var(--accent);color:#fff}
.btn-icon.play-btn{background:var(--primary);color:#fff;font-size:18px}
.btn-icon.play-btn:hover{background:var(--primary-dim);transform:scale(1.05)}
.station.playing .btn-icon.play-btn{background:var(--accent)}

/* Player Bar */
.player-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#1a1a2e,#16213e);padding:12px 20px;box-shadow:0 -4px 24px rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;gap:16px}
.player-info{flex:1;min-width:0}
.player-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-status{font-size:11px;color:var(--text-dim)}
.player-controls{display:flex;align-items:center;gap:12px;flex-shrink:0}
.player-btn{width:36px;height:36px;border:none;border-radius:50%;background:var(--primary);color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.player-btn:hover{background:var(--primary-dim)}
.player-btn.stop{background:var(--surface2);color:var(--accent)}
.player-btn.stop:hover{background:var(--accent);color:#fff}
.volume-wrap{display:flex;align-items:center;gap:6px}
.volume-wrap input[type="range"]{width:80px;height:4px;-webkit-appearance:none;appearance:none;background:var(--surface2);border-radius:2px;outline:none}
.volume-wrap input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--primary);cursor:pointer}
.volume-wrap input[type="range"]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--primary);cursor:pointer;border:none}

/* Loading & Empty */
.loading{text-align:center;padding:40px;color:var(--text-dim)}
.spinner{width:36px;height:36px;border:4px solid var(--surface2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:14px}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--primary-dim)}

/* Favorites remove btn */
.remove-fav{color:var(--accent)}
.remove-fav:hover{background:var(--accent);color:#fff}

/* Responsive */
@media(max-width:600px){
  header{padding:12px 14px}
  .header-row{flex-direction:column;align-items:stretch}
  .search-wrap{min-width:0}
  .tabs{padding:0 14px}
  main{padding:12px 14px}
  .station{padding:12px 14px}
  .player-bar{padding:10px 14px;gap:10px;flex-wrap:wrap}
  .volume-wrap input[type="range"]{width:60px}
  .volume-wrap span{display:none}
  .station-meta span{margin-right:6px}
}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">Radio Browser</div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Поиск радиостанций..." autocomplete="off">
      <button id="searchBtn">Поиск</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="search">Поиск</button>
    <button class="tab" data-tab="favorites">Избранное <span class="badge" id="favCount">0</span></button>
  </div>
</header>

<main>
  <div id="tabSearch">
    <div class="section-title">Результаты поиска</div>
    <div id="searchResults"></div>
  </div>
  <div id="tabFavorites" class="hidden">
    <div class="section-title">Избранные станции</div>
    <div id="favResults"></div>
  </div>
</main>

<div class="player-bar" id="playerBar">
  <div class="player-info">
    <div class="player-name" id="playerName">Не выбрано</div>
    <div class="player-status" id="playerStatus">Нажмите на станцию для воспроизведения</div>
  </div>
  <div class="player-controls">
    <button class="player-btn" id="playerPlayBtn" title="Пауза">⏸</button>
    <button class="player-btn stop" id="playerStopBtn" title="Стоп">⏹</button>
    <div class="volume-wrap">
      <span style="font-size:13px;color:var(--text-dim)">🔊</span>
      <input type="range" id="volumeRange" min="0" max="1" step="0.05" value="0.8">
    </div>
  </div>
</div>

<audio id="audioEl" style="display:none"></audio>

<script>
/* ---------- RadioBrowser API ---------- */
const API = 'https://de1.api.radio-browser.info';

async function apiFetch(path){
  const res = await fetch(API+path);
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

function searchStations(query){
  if(!query.trim()) return Promise.resolve([]);
  return apiFetch('/json/stations/byname/'+encodeURIComponent(query.trim())+'?limit=60&hidebroken=true');
}

function getTopStations(){
  return apiFetch('/json/stations/topvote/30?hidebroken=true');
}

/* ---------- State ---------- */
let favorites = [];
let currentStation = null;
let isPlaying = false;
let searchResults = [];

/* ---------- DOM refs ---------- */
const audio = document.getElementById('audioEl');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const searchResultsEl = document.getElementById('searchResults');
const favResultsEl = document.getElementById('favResults');
const playerName = document.getElementById('playerName');
const playerStatus = document.getElementById('playerStatus');
const playerPlayBtn = document.getElementById('playerPlayBtn');
const playerStopBtn = document.getElementById('playerStopBtn');
const volumeRange = document.getElementById('volumeRange');
const favCount = document.getElementById('favCount');
const tabSearch = document.getElementById('tabSearch');
const tabFavorites = document.getElementById('tabFavorites');

/* ---------- Persistence ---------- */
function loadFavorites(){
  try{
    const d = localStorage.getItem('radio_favorites');
    favorites = d ? JSON.parse(d) : [];
  }catch(e){favorites=[]}
}
function saveFavorites(){
  localStorage.setItem('radio_favorites', JSON.stringify(favorites));
  updateFavBadge();
  if(!tabFavorites.classList.contains('hidden')) renderFavorites();
}
function updateFavBadge(){favCount.textContent=favorites.length}

/* ---------- Render helpers ---------- */
function renderStation(station){
  const isFav = favorites.some(f => f.stationuuid === station.stationuuid);
  const div = document.createElement('div');
  div.className = 'station' + (currentStation && currentStation.stationuuid===station.stationuuid&&isPlaying ? ' playing' : '');
  div.dataset.uuid = station.stationuuid;

  const name = station.name || station.title || 'Unknown';
  const country = station.country || '';
  const tags = (station.tags || '').split(',').filter(Boolean).slice(0,3).join(', ');
  const reliability = station.votes ? '⭐'+station.votes : '';
  const codec = station.codec || '';

  div.innerHTML = `
    <div class="station-info">
      <div class="station-name">${escHtml(name)}</div>
      <div class="station-meta">
        ${country ? '<span>📍'+escHtml(country)+'</span>' : ''}
        ${tags ? '<span>🏷️'+escHtml(tags)+'</span>' : ''}
        ${reliability ? '<span>'+reliability+'</span>' : ''}
        ${codec ? '<span>'+escHtml(codec)+'</span>' : ''}
      </div>
    </div>
    <div class="station-btns">
      <button class="btn-icon play-btn" title="Играть">▶</button>
      <button class="btn-icon ${isFav ? 'remove-fav' : ''}" title="${isFav ? 'Удалить из избранного' : 'В избранное'}">
        ${isFav ? '✕' : '☆'}
      </button>
    </div>
  `;

  const playBtn = div.querySelector('.play-btn');
  playBtn.addEventListener('click', e => { e.stopPropagation(); playStation(station); });

  const favBtn = div.querySelector('.btn-icon:last-child');
  favBtn.addEventListener('click', e => {
    e.stopPropagation();
    if(isFav){
      removeFavorite(station.stationuuid);
    }else{
      addFavorite(station);
    }
  });

  div.addEventListener('click', () => playStation(station));
  return div;
}

function renderStationList(stations, container, emptyMsg){
  container.innerHTML = '';
  if(!stations || stations.length===0){
    container.innerHTML = `<div class="empty-state"><div class="icon">📻</div><p>${emptyMsg || 'Ничего не найдено'}</p></div>`;
    return;
  }
  stations.forEach(s => container.appendChild(renderStation(s)));
}

/* ---------- Search ---------- */
async function doSearch(){
  const q = searchInput.value.trim();
  if(!q){
    showLoading(searchResultsEl);
    try{
      const top = await getTopStations();
      searchResults = top;
      renderStationList(top, searchResultsEl, 'Ничего не найдено');
    }catch(e){
      searchResultsEl.innerHTML = `<div class="empty-state"><p>Ошибка загрузки: ${escHtml(e.message)}</p></div>`;
    }
    return;
  }
  showLoading(searchResultsEl);
  try{
    const res = await searchStations(q);
    searchResults = res;
    renderStationList(res, searchResultsEl, 'Ничего не найдено');
  }catch(e){
    searchResultsEl.innerHTML = `<div class="empty-state"><p>Ошибка: ${escHtml(e.message)}</p></div>`;
  }
}

function showLoading(el){
  el.innerHTML = `<div class="loading"><div class="spinner"></div><p>Загрузка...</p></div>`;
}

/* ---------- Favorites ---------- */
function addFavorite(station){
  if(favorites.some(f => f.stationuuid===station.stationuuid)) return;
  favorites.push(station);
  saveFavorites();
  highlightFavBtn(station.stationuuid, true);
}
function removeFavorite(uuid){
  favorites = favorites.filter(f => f.stationuuid!==uuid);
  saveFavorites();
  highlightFavBtn(uuid, false);
  renderSearchResultsCurrent();
}

function renderFavorites(){
  renderStationList(favorites, favResultsEl, 'Нет избранных станций');
}

function highlightFavBtn(uuid, isFav){
  document.querySelectorAll('.station').forEach(el => {
    if(el.dataset.uuid===uuid){
      const btn = el.querySelector('.btn-icon:last-child');
      if(btn){
        btn.innerHTML = isFav ? '✕' : '☆';
        btn.title = isFav ? 'Удалить из избранного' : 'В избранное';
        btn.classList.toggle('remove-fav', isFav);
      }
    }
  });
}

function renderSearchResultsCurrent(){
  renderStationList(searchResults, searchResultsEl, 'Ничего не найдено');
}

/* ---------- Playback ---------- */
function playStation(station){
  const url = station.url || station.url_resolved || '';
  if(!url){
    playerStatus.textContent = 'Нет URL для воспроизведения';
    return;
  }

  if(currentStation && currentStation.stationuuid===station.stationuuid && isPlaying){
    audio.pause();
    isPlaying = false;
    updatePlayerUI(station, false);
    document.querySelectorAll('.station.playing').forEach(el => el.classList.remove('playing'));
    return;
  }

  currentStation = station;
  audio.src = url;
  audio.volume = parseFloat(volumeRange.value);
  audio.play().then(() => {
    isPlaying = true;
    updatePlayerUI(station, true);
    document.querySelectorAll('.station.playing').forEach(el => el.classList.remove('playing'));
    document.querySelectorAll('.station').forEach(el => {
      if(el.dataset.uuid===station.stationuuid) el.classList.add('playing');
    });
  }).catch(err => {
    isPlaying = false;
    playerStatus.textContent = 'Ошибка воспроизведения';
    console.error('Play error:', err);
  });
}

function stopPlayback(){
  audio.pause();
  audio.removeAttribute('src');
  audio.load();
  isPlaying = false;
  currentStation = null;
  playerName.textContent = 'Не выбрано';
  playerStatus.textContent = 'Нажмите на станцию для воспроизведения';
  document.querySelectorAll('.station.playing').forEach(el => el.classList.remove('playing'));
}

function togglePlay(){
  if(!currentStation) return;
  if(isPlaying){
    audio.pause();
    isPlaying = false;
    updatePlayerUI(currentStation, false);
    document.querySelectorAll('.station.playing').forEach(el => el.classList.remove('playing'));
  }else if(currentStation){
    audio.play().then(() => {
      isPlaying = true;
      updatePlayerUI(currentStation, true);
      document.querySelectorAll('.station').forEach(el => {
        if(el.dataset.uuid===currentStation.stationuuid) el.classList.add('playing');
      });
    }).catch(() => {});
  }
}

function updatePlayerUI(station, playing){
  const name = station.name || station.title || 'Unknown';
  playerName.textContent = name;
  playerStatus.textContent = playing ? 'Сейчас играет' : 'На паузе';
  playerPlayBtn.textContent = playing ? '⏸' : '▶';
}

/* ---------- Volume ---------- */
volumeRange.addEventListener('input', () => {
  audio.volume = parseFloat(volumeRange.value);
});

/* ---------- Tab switching ---------- */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const t = tab.dataset.tab;
    tabSearch.classList.toggle('hidden', t!=='search');
    tabFavorites.classList.toggle('hidden', t!=='favorites');
    if(t==='favorites') renderFavorites();
  });
});

/* ---------- Utils ---------- */
function escHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ---------- Event listeners ---------- */
searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
playerPlayBtn.addEventListener('click', togglePlay);
playerStopBtn.addEventListener('click', stopPlayback);

/* ---------- Init ---------- */
loadFavorites();
updateFavBadge();
renderFavorites();
doSearch(); // load top stations on start

/* Handle audio errors */
audio.addEventListener('error', () => {
  playerStatus.textContent = 'Ошибка воспроизведения';
  isPlaying = false;
  if(currentStation) updatePlayerUI(currentStation, false);
});

/* Toggle play/pause icon on audio events */
audio.addEventListener('pause', () => {
  if(currentStation) updatePlayerUI(currentStation, false);
});
audio.addEventListener('play', () => {
  if(currentStation) updatePlayerUI(currentStation, true);
});
</script>
</body>
</html>
